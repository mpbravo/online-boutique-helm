name: Release Helm Charts

on:
  push:
    branches:
      - main
  # Allow manual re-runs from the GitHub Actions UI
  workflow_dispatch:

# Prevent concurrent runs so the gh-pages index is never written by two jobs at once
concurrency:
  group: release-charts
  cancel-in-progress: false

jobs:
  release:
    name: Package and publish changed charts
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub releases and push to gh-pages

    steps:
      # Full history is required by chart-releaser to detect changed charts
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      # Install the cr binary only — we call each cr command explicitly below
      # so that `cr index` always runs even when no new chart version is detected
      - name: Install chart-releaser (cr)
        uses: helm/chart-releaser-action@v1.6.0
        with:
          install_only: true

      # Update Helm dependencies for every chart before packaging
      - name: Update chart dependencies
        run: |
          for chart in $(find . -maxdepth 2 -name "Chart.yaml" | xargs -I{} dirname {}); do
            echo "Updating dependencies for $chart"
            helm dependency update "$chart"
          done

      # Package every chart found under the repo root into .cr-release-packages/
      - name: Package charts
        run: |
          for chart in $(find . -maxdepth 2 -name "Chart.yaml" | xargs -I{} dirname {} | grep -v '^\.$'); do
            echo "Packaging $chart"
            cr package "$chart" --package-path .cr-release-packages
          done

      # Create a GitHub release per chart version if one does not already exist,
      # and attach the .tgz artifact. --skip-existing makes this idempotent.
      - name: Upload chart packages to GitHub Releases
        run: |
          cr upload \
            --owner            "${{ github.repository_owner }}" \
            --git-repo         "${{ github.event.repository.name }}" \
            --token            "${{ secrets.GITHUB_TOKEN }}" \
            --package-path     .cr-release-packages \
            --skip-existing \
            --make-release-latest true

      # Always regenerate index.yaml from all existing GitHub releases and
      # push it to the gh-pages branch — even when no new release was created.
      - name: Update Helm repository index on gh-pages
        run: |
          cr index \
            --owner        "${{ github.repository_owner }}" \
            --git-repo     "${{ github.event.repository.name }}" \
            --token        "${{ secrets.GITHUB_TOKEN }}" \
            --pages-branch gh-pages \
            --index-path   index.yaml \
            --push
